spring.application.name=training-backend
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/training_db
spring.datasource.username=training_user
spring.datasource.password=training_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT (f¸r sp‰ter)
jwt.secret=your-secret-key-change-this-in-production-must-be-at-least-256-bits-long-for-security
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.de.mornhinweg.trainingbackend=DEBUG